; WireClaw - ESP32 AI Agent
;
; Build:   pio run                    (builds default target: esp32-c6)
; Upload:  pio run -t upload
; Monitor: pio device monitor
; FS:      pio run -t uploadfs
;
; Other targets: pio run -e esp32-s3, pio run -e esp32, pio run -e esp32-c3

[platformio]
default_envs = esp32-s3-touch-amoled-1-75

[env]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/stable/platform-espressif32.zip
framework = arduino
extra_scripts = pre:scripts/generate_config.py
board_build.filesystem = littlefs
board_build.partitions = partitions.csv
board_upload.flash_size = 4MB
monitor_speed = 115200
monitor_filters = colorize, time

[env:esp32-c6]
board = esp32-c6-devkitc-1
upload_port = /dev/ttyACM0
monitor_port = /dev/ttyACM0

[env:esp32-s3]
board = esp32-s3-devkitc-1

; Classic ESP32 not supported: DRAM overflow (~60KB over dram0_0_seg limit)
; due to large static buffers (LLM request, history, TLS). Use ESP32-C3 instead.
;[env:esp32]
;board = esp32dev

[env:esp32-c3]
board = esp32-c3-devkitm-1


[env:esp32-s3-touch-amoled-1-75]
board = esp32-s3-devkitc-1
board_build.mcu = esp32s3
board_build.f_cpu = 240000000L
board_build.psram_type = opi
board_build.arduino.memory_type = qio_opi
build_flags =
    -D BOARD_WAVESHARE_AMOLED
    -D BOARD_HAS_PSRAM
    -D ARDUINO_USB_CDC_ON_BOOT=1
board_upload.flash_size = 16MB
board_build.partitions = default_16MB.csv
lib_deps =
    moononournation/GFX Library for Arduino @ ^1.5.0
    lewisxhe/XPowersLib @ ~0.2.1
    links2004/WebSockets @ ^2.6.1
    bblanchon/ArduinoJson @ ^7.0.4
